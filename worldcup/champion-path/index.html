<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>2026 美加墨世界杯 · 我的夺冠之路</title>
<style>
  /* ============ 全局主题：球场海报背景 + 金色冠军 ============ */
  :root{
    --gold:#FFD24A;
    --gold-deep:#caa12f;
    --glass:rgba(7,18,28,.62);
    --glass-hover:rgba(14,40,32,.78);
    --line:rgba(255,210,74,.42);
    --text:#eef4f1;
    --muted:#9fb6ad;
    --shadow:0 8px 22px rgba(0,0,0,.5);
    --conn:rgba(255,210,74,.5);   /* 连接线颜色 */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    color:var(--text);min-height:100vh;
    /* 球场主题海报背景（同目录图片，非外链） */
    background:url('stadium-bg.jpg') center/cover no-repeat fixed, #05101a;
  }
  /* 深色遮罩（加深）+ 四周更暗的径向暗角，突出标题/按钮/对阵卡文字 */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 38%, rgba(4,10,22,.20), rgba(4,10,22,.52) 100%),
      linear-gradient(180deg, rgba(4,10,22,.48), rgba(4,10,22,.28) 38%, rgba(4,10,22,.52));}
  /* 整页占满视口高度，顶部固定高度、对阵树吃掉剩余高度 */
  .wrap{position:relative;z-index:1;height:100vh;height:100dvh;max-width:1640px;margin:0 auto;
    padding:10px 14px 10px;display:flex;flex-direction:column;}

  /* ============ 顶部区（紧凑，给对阵树让出高度） ============ */
  #topbar{flex:0 0 auto;}
  header.hero{text-align:center;margin-bottom:4px;}
  .hero .cap{color:var(--gold);font-size:11px;letter-spacing:3px;}
  .hero h1{
    margin:2px 0 0;font-size:clamp(17px,2.4vw,30px);font-weight:800;letter-spacing:.5px;
    display:inline-flex;align-items:center;gap:.3em;
  }
  /* 标题文字金色渐变（用内层 span，避免奖杯图被 clip 成透明） */
  .hero h1 .ttl{
    background:linear-gradient(90deg,#fff,var(--gold) 55%,#fff);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 2px 14px rgba(0,0,0,.4);
  }
  /* 标题里的奖杯小图标(trophy.png)：与文字等高、垂直居中、保持比例 */
  .hero h1 .h1-trophy{height:1.15em;width:auto;object-fit:contain;vertical-align:middle;
    filter:drop-shadow(0 2px 6px rgba(255,210,74,.45));}

  /* ============ 控制条 + 进度 ============ */
  .toolbar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:center;margin:6px auto 3px;}
  .btn{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);
    padding:7px 13px;border-radius:999px;font-size:12.5px;cursor:pointer;font-weight:600;
    transition:transform .15s, background .2s, border-color .2s;backdrop-filter:blur(4px);white-space:nowrap;}
  .btn:hover{background:rgba(255,210,74,.14);border-color:var(--gold);transform:translateY(-1px);}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#241c00;border:none;}
  .progress-box{max-width:480px;margin:4px auto 4px;text-align:center;}
  .progress-track{height:8px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;border:1px solid rgba(255,255,255,.08);}
  .progress-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--gold-deep),var(--gold));transition:width .35s;box-shadow:0 0 12px rgba(255,210,74,.5);}
  .progress-label{font-size:12px;color:var(--muted);margin-top:5px;}
  .progress-label b{color:var(--gold);font-size:14px;}

  /* ============ 镜像对阵树（一屏自适应：缩放后居中，不滚动） ============ */
  /* viewport 占据顶部之外的剩余高度，stage 在其中按 fit 缩放并水平+垂直居中 */
  .stage-viewport{position:relative;flex:1 1 auto;min-height:0;width:100%;overflow:hidden;}
  .stage{
    position:absolute;top:0;left:0;   /* 用 JS 把它平移到居中位置 */
    width:1624px;
    display:grid;
    /* 9 列（略加宽）：L-R32 | L-R16 | L-QF | L-SF | 中央 | R-SF | R-QF | R-R16 | R-R32 */
    grid-template-columns:
      188px 172px 172px 172px 216px 172px 172px 172px 188px;
    column-gap:0;align-items:stretch;
    transform-origin:top left;        /* 关键：左上角为原点，配合 JS 平移居中，避免缩成一条缝 */
    padding-top:6px;                  /* 轮次标题已去掉，回收顶部高度，树整体上移 */
  }
  /* SVG 连接线层，铺满整个 stage（在卡片下方） */
  #lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:visible;}
  .col{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:space-around;padding:0 8px;}

  /* 比赛卡（白色半透明边框，更清晰）；轮次标题/小角标已去掉 */
  .match{background:var(--glass);border:1.5px solid rgba(255,255,255,.6);border-radius:11px;overflow:hidden;
    box-shadow:var(--shadow);backdrop-filter:blur(6px);margin:5px 0;}
  .match .mtag{display:none;}   /* 去掉 L1/L2…R8 轮次标签角块 */
  .slot{display:flex;align-items:center;gap:9px;padding:10px 11px;cursor:pointer;transition:background .2s, transform .15s;border-left:3px solid transparent;}
  .slot+.slot{border-top:1px solid rgba(255,255,255,.18);}
  .slot:hover:not(.empty){background:var(--glass-hover);}
  /* 国旗、队名再放大一档，球队信息更醒目 */
  .slot .flag{font-size:32px;width:37px;text-align:center;flex:0 0 auto;line-height:1;}
  .slot .nm{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;letter-spacing:.3px;}
  .slot.empty{cursor:default;}
  .slot.empty .nm{color:var(--muted);font-weight:500;font-style:italic;}
  .slot.empty .flag{opacity:.35;}
  .slot.picked{background:linear-gradient(90deg,rgba(255,210,74,.26),rgba(255,210,74,.05));border-left-color:var(--gold);}
  .slot.picked .nm{color:var(--gold);}
  .slot.loser{opacity:.38;filter:grayscale(.5);}
  .slot.loser .nm{text-decoration:line-through;}
  /* 右半区卡片镜像：旗标在右、金边在右 */
  .col.right .slot{border-left:none;border-right:3px solid transparent;flex-direction:row-reverse;}
  .col.right .slot.picked{border-right-color:var(--gold);}
  @keyframes pop{0%{transform:scale(.9);}55%{transform:scale(1.07);}100%{transform:scale(1);}}
  .slot.animate{animation:pop .28s ease;}

  /* ============ 中央冠军格 ============ */
  /* center-col 占满整列高度；中间放"决赛框+三四名"的居中组(与左右半决赛框齐平)，
     冠军展示(奖杯+国旗+队名)用绝对定位悬在决赛框上方、显示得更高 */
  .center-col{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
  /* center-mid 只让"决赛框"占据居中位置(与左右半决赛框齐平)；三四名框绝对悬在其下方，不影响决赛框居中 */
  .center-mid{position:relative;display:flex;flex-direction:column;align-items:center;}
  .center-mid .third-box{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);}
  .champ-box{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(50% + 96px);
    width:200px;border-radius:16px;padding:12px 10px 10px;text-align:center;
    border:1.5px solid var(--line);
    background:radial-gradient(circle at 50% 0%, rgba(255,210,74,.22), rgba(7,18,28,.85));
    box-shadow:0 10px 30px rgba(0,0,0,.5), 0 0 22px rgba(255,210,74,.18);backdrop-filter:blur(6px);}
  /* 真实大力神杯图：固定高度+自动宽度保持比例；未决出暗淡，决出点亮 */
  .champ-box .trophy{height:118px;width:auto;object-fit:contain;margin:0 auto 2px;display:block;
    transition:filter .3s, opacity .3s;}
  .champ-box.empty .trophy{filter:grayscale(.6) brightness(.6);opacity:.5;}
  .champ-box:not(.empty) .trophy{filter:drop-shadow(0 6px 16px rgba(255,210,74,.65));opacity:1;}
  .champ-box .cflag{font-size:38px;margin-top:2px;}
  .champ-box .cname{font-size:25px;font-weight:800;margin-top:1px;color:var(--gold);}
  /* 三四名决赛小格（放决赛框下方） */
  .third-box{width:200px;border-radius:12px;padding:8px;text-align:center;
    border:1px solid rgba(255,255,255,.18);background:rgba(7,18,28,.6);backdrop-filter:blur(5px);}
  .third-box .t-cap{font-size:9.5px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
  .third-box .t-row{font-size:11.5px;color:var(--text);}
  .third-box .t-row .muted{color:var(--muted);}

  /* ============ 礼花 / toast ============ */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:rgba(7,18,28,.96);border:1px solid var(--line);color:var(--text);
    padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:60;box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:780px){
    .hero .cap{font-size:10px;letter-spacing:2px;}
    .btn{padding:6px 11px;font-size:12px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="topbar">
    <header class="hero">
      <div class="cap">FIFA WORLD CUP 2026 · 加拿大 / 墨西哥 / 美国</div>
      <h1><img class="h1-trophy" src="trophy.png" alt="大力神杯"><span class="ttl">2026 美加墨世界杯 · 我的夺冠之路</span></h1>
    </header>

    <div class="toolbar">
      <button class="btn gold" id="btnRandom">🎲 随机生成</button>
      <button class="btn" id="btnReset">🔄 清空选项</button>
      <button class="btn" id="btnSave">💾 保存进度</button>
      <button class="btn" id="btnExport">🖼️ 导出夺冠之路卡片</button>
      <button class="btn" id="btnCopyLink">🔗 分享链接</button>
    </div>

    <div class="progress-box">
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-label">已完成选择 <b id="progNum">0</b> / 31 场</div>
    </div>
  </div>

  <!-- 镜像对阵树（一屏自适应：缩放后居中，不滚动） -->
  <div class="stage-viewport" id="stageViewport">
    <div class="stage" id="stage">
      <svg id="lines" xmlns="http://www.w3.org/2000/svg"></svg>
      <!-- 列由 JS 生成 -->
    </div>
  </div>

</div>

<canvas id="confetti"></canvas>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   2026 世界杯「我的夺冠之路」· FIFA 官方镜像对阵树
   纯原生 JS，无任何外部依赖（背景图为同目录文件）。
   ===================================================================== */

/* ---------- 1. 球队数据 ---------- */
const T = {
  GER:{flag:"🇩🇪",name:"德国"}, PAR:{flag:"🇵🇾",name:"巴拉圭"},
  FRA:{flag:"🇫🇷",name:"法国"}, SWE:{flag:"🇸🇪",name:"瑞典"},
  RSA:{flag:"🇿🇦",name:"南非"}, CAN:{flag:"🇨🇦",name:"加拿大"},
  NED:{flag:"🇳🇱",name:"荷兰"}, MAR:{flag:"🇲🇦",name:"摩洛哥"},
  POR:{flag:"🇵🇹",name:"葡萄牙"}, CRO:{flag:"🇭🇷",name:"克罗地亚"},
  ESP:{flag:"🇪🇸",name:"西班牙"}, AUT:{flag:"🇦🇹",name:"奥地利"},
  USA:{flag:"🇺🇸",name:"美国"}, BIH:{flag:"🇧🇦",name:"波黑"},
  BEL:{flag:"🇧🇪",name:"比利时"}, SEN:{flag:"🇸🇳",name:"塞内加尔"},
  BRA:{flag:"🇧🇷",name:"巴西"}, JPN:{flag:"🇯🇵",name:"日本"},
  CIV:{flag:"🇨🇮",name:"科特迪瓦"}, NOR:{flag:"🇳🇴",name:"挪威"},
  MEX:{flag:"🇲🇽",name:"墨西哥"}, ECU:{flag:"🇪🇨",name:"厄瓜多尔"},
  ENG:{flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",name:"英格兰"}, COD:{flag:"🇨🇩",name:"刚果(金)"},
  ARG:{flag:"🇦🇷",name:"阿根廷"}, CPV:{flag:"🇨🇻",name:"佛得角"},
  AUS:{flag:"🇦🇺",name:"澳大利亚"}, EGY:{flag:"🇪🇬",name:"埃及"},
  SUI:{flag:"🇨🇭",name:"瑞士"}, ALG:{flag:"🇩🇿",name:"阿尔及利亚"},
  COL:{flag:"🇨🇴",name:"哥伦比亚"}, GHA:{flag:"🇬🇭",name:"加纳"},
};

/* ---------- 2. 修正版镜像拓扑 ----------
   side:'L'左半区 / 'R'右半区 / 'C'中央；col:0..4 离中心距离（0最外，4=决赛）
*/
const MATCHES = [
  // 左半区 R32（col0）自上而下 L1..L8
  {id:"L1",side:"L",col:0,a:{team:"GER"},b:{team:"PAR"}},
  {id:"L2",side:"L",col:0,a:{team:"FRA"},b:{team:"SWE"}},
  {id:"L3",side:"L",col:0,a:{team:"RSA"},b:{team:"CAN"}},
  {id:"L4",side:"L",col:0,a:{team:"NED"},b:{team:"MAR"}},
  {id:"L5",side:"L",col:0,a:{team:"POR"},b:{team:"CRO"}},
  {id:"L6",side:"L",col:0,a:{team:"ESP"},b:{team:"AUT"}},
  {id:"L7",side:"L",col:0,a:{team:"USA"},b:{team:"BIH"}},
  {id:"L8",side:"L",col:0,a:{team:"BEL"},b:{team:"SEN"}},
  // 右半区 R32（col0）自上而下 R1..R8
  {id:"R1",side:"R",col:0,a:{team:"BRA"},b:{team:"JPN"}},
  {id:"R2",side:"R",col:0,a:{team:"CIV"},b:{team:"NOR"}},
  {id:"R3",side:"R",col:0,a:{team:"MEX"},b:{team:"ECU"}},
  {id:"R4",side:"R",col:0,a:{team:"ENG"},b:{team:"COD"}},
  {id:"R5",side:"R",col:0,a:{team:"ARG"},b:{team:"CPV"}},
  {id:"R6",side:"R",col:0,a:{team:"AUS"},b:{team:"EGY"}},
  {id:"R7",side:"R",col:0,a:{team:"SUI"},b:{team:"ALG"}},
  {id:"R8",side:"R",col:0,a:{team:"COL"},b:{team:"GHA"}},
  // 左 R16（col1）
  {id:"LR1",side:"L",col:1,a:{from:"L1"},b:{from:"L2"}},
  {id:"LR2",side:"L",col:1,a:{from:"L3"},b:{from:"L4"}},
  {id:"LR3",side:"L",col:1,a:{from:"L5"},b:{from:"L6"}},
  {id:"LR4",side:"L",col:1,a:{from:"L7"},b:{from:"L8"}},
  // 右 R16（col1）
  {id:"RR1",side:"R",col:1,a:{from:"R1"},b:{from:"R2"}},
  {id:"RR2",side:"R",col:1,a:{from:"R3"},b:{from:"R4"}},
  {id:"RR3",side:"R",col:1,a:{from:"R5"},b:{from:"R6"}},
  {id:"RR4",side:"R",col:1,a:{from:"R7"},b:{from:"R8"}},
  // QF（col2）
  {id:"LQF1",side:"L",col:2,a:{from:"LR1"},b:{from:"LR2"}},
  {id:"LQF2",side:"L",col:2,a:{from:"LR3"},b:{from:"LR4"}},
  {id:"RQF1",side:"R",col:2,a:{from:"RR1"},b:{from:"RR2"}},
  {id:"RQF2",side:"R",col:2,a:{from:"RR3"},b:{from:"RR4"}},
  // SF（col3）
  {id:"LSF",side:"L",col:3,a:{from:"LQF1"},b:{from:"LQF2"}},
  {id:"RSF",side:"R",col:3,a:{from:"RQF1"},b:{from:"RQF2"}},
  // 决赛（col4，中央）
  {id:"FINAL",side:"C",col:4,a:{from:"LSF"},b:{from:"RSF"}},
];
const MATCH_BY_ID = Object.fromEntries(MATCHES.map(m=>[m.id,m]));
// 反向索引：某场胜者流入下一场的哪个槽
const FLOWS_TO = {};
MATCHES.forEach(m=>['a','b'].forEach(slot=>{const s=m[slot];if(s.from)FLOWS_TO[s.from]={matchId:m.id,slot};}));

// 9 列布局映射：[side,col] -> grid 列序(1..9)
function gridColIndex(side,col){
  if(side==='C') return 5;        // 中央
  if(side==='L') return col+1;    // L: col0->1 ... col3->4
  return 9-col;                   // R: col0->9 ... col3->6
}

/* ---------- 3. 状态 ---------- */
let picks = {};  // picks[matchId] = 胜者队伍代码

function resolveSlotTeam(src){
  if(src.team) return src.team;
  if(src.from) return picks[src.from] || null;
  return null;
}
// 级联清空：改某场胜者 → 递归清掉所有依赖它的下游
function cascadeClear(matchId){
  const f = FLOWS_TO[matchId]; if(!f) return;
  const d = f.matchId;
  if(picks[d] !== undefined){ delete picks[d]; cascadeClear(d); }
}
function pickTeam(matchId, slot){
  const m = MATCH_BY_ID[matchId];
  const team = resolveSlotTeam(m[slot]);
  if(!team) return;                 // 槽位未填队伍，不可点
  const prev = picks[matchId];
  if(prev === team) return;         // 同一支，无变化
  picks[matchId] = team;
  if(prev !== undefined && prev !== team) cascadeClear(matchId); // 改选 → 清下游
  render(matchId+'-'+slot);
  save(true);
  if(matchId === 'FINAL') fireConfetti();
}

/* ---------- 4. 渲染 ---------- */
const stageEl = document.getElementById('stage');
const linesSvg = document.getElementById('lines');

function render(animKey){
  // 清掉旧列（保留 svg）
  [...stageEl.querySelectorAll('.col, .center-col')].forEach(n=>n.remove());

  // 9 列容器（轮次标题已去掉，不再生成列头）
  const colDivs = {};
  for(let g=1; g<=9; g++){
    const d = document.createElement('div');
    if(g===5){ d.className='center-col'; }
    else{ d.className = 'col ' + (g>5?'right':'left'); }
    d.style.gridColumn = g;
    stageEl.appendChild(d);
    colDivs[g] = d;
  }

  // 放比赛卡（决赛除外，决赛放中央格内）
  MATCHES.forEach(m=>{
    if(m.id==='FINAL') return;
    const g = gridColIndex(m.side, m.col);
    colDivs[g].appendChild(buildMatch(m, animKey));
  });

  // 中央：冠军大格 + 决赛 + 三四名
  buildCenter(colDivs[5], animKey);

  requestAnimationFrame(()=>{ drawLines(); });
  fitStage();
  updateProgress();
}

function slotInner(teamCode){
  const t=T[teamCode];
  return `<span class="flag">${t.flag}</span><span class="nm">${t.name}</span>`;
}

function buildMatch(m, animKey){
  const wrap=document.createElement('div');
  wrap.className='match'; wrap.dataset.mid=m.id;
  wrap.innerHTML=`<div class="mtag">${m.id}</div>`;
  ['a','b'].forEach(slot=>{
    const tc=resolveSlotTeam(m[slot]);
    const div=document.createElement('div');
    const picked = tc && picks[m.id]===tc;
    const loser  = tc && picks[m.id] && picks[m.id]!==tc;
    if(!tc){
      div.className='slot empty';
      div.innerHTML=`<span class="flag">⚽</span><span class="nm">待定</span>`;
    }else{
      div.className='slot'+(picked?' picked':'')+(loser?' loser':'');
      div.innerHTML=slotInner(tc);
      div.addEventListener('click',()=>pickTeam(m.id,slot));
      if(animKey===m.id+'-'+slot) div.classList.add('animate');
    }
    wrap.appendChild(div);
  });
  return wrap;
}

const TROPHY_GOLD='#FFD24A';   // 导出图里的金色

const trophyImg = new Image();
trophyImg.src = TROPHY_DATAURI;          // 预加载，供导出 drawImage 使用
const stadiumImg = new Image();
stadiumImg.src = STADIUM_DATAURI;        // 球场背景预加载，供导出卡片（与主页一致）
const TROPHY_IMG_TAG = `<img class="trophy" src="trophy.png" alt="大力神杯">`;

function buildCenter(box, animKey){
  const champ = picks['FINAL'];

  // 冠军展示格（绝对定位，悬在决赛框上方、显示得更高）：奖杯 + 国旗 + 队名
  const cb=document.createElement('div');
  cb.className='champ-box'+(champ?'':' empty');
  if(champ){
    cb.innerHTML=`${TROPHY_IMG_TAG}<div class="cflag">${T[champ].flag}</div><div class="cname">${T[champ].name}</div>`;
  }else{
    cb.innerHTML=TROPHY_IMG_TAG;   // 未决出：只留暗淡奖杯，无占位文字
  }
  box.appendChild(cb);

  // 中间居中组：决赛框 + 三四名（决赛框与左右半决赛框上下齐平）
  const mid=document.createElement('div');
  mid.className='center-mid';

  const fm=buildMatch(MATCH_BY_ID['FINAL'], animKey);
  fm.style.width='200px';
  mid.appendChild(fm);

  const tb=document.createElement('div');
  tb.className='third-box';
  const lLose=loserOf('LSF'), rLose=loserOf('RSF');
  let rowHtml;
  if(lLose&&rLose){
    rowHtml=`${T[lLose].flag} ${T[lLose].name} <span class="muted">vs</span> ${T[rLose].flag} ${T[rLose].name}`;
  }else{
    rowHtml=`<span class="muted">— 待半决赛分出胜负 —</span>`;
  }
  tb.innerHTML=`<div class="t-cap">🥉 三四名决赛</div><div class="t-row">${rowHtml}</div>`;
  mid.appendChild(tb);

  box.appendChild(mid);
}
// 取某场的"败者"
function loserOf(matchId){
  const w=picks[matchId]; if(!w) return null;
  const m=MATCH_BY_ID[matchId];
  const a=resolveSlotTeam(m.a), b=resolveSlotTeam(m.b);
  if(!a||!b) return null;
  return w===a ? b : a;
}

/* ---------- 5. 肘形连接线（SVG） ----------
   每场卡的"出口"(朝中心的一侧中点)连到胜者流入的下一场卡的"入口"。
   坐标取相对 stage 的本地坐标（stage 整体缩放时 SVG 同步缩放，坐标系一致）。
*/
function localRect(el){
  // 用 offset 链算出相对 stage 的位置，避免受 transform:scale 影响
  let x=0,y=0,node=el;
  while(node && node!==stageEl){ x+=node.offsetLeft; y+=node.offsetTop; node=node.offsetParent; }
  return {left:x, top:y, right:x+el.offsetWidth, bottom:y+el.offsetHeight, w:el.offsetWidth, h:el.offsetHeight};
}
function drawLines(){
  const W=stageEl.offsetWidth, H=stageEl.offsetHeight;
  linesSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  linesSvg.setAttribute('width', W);
  linesSvg.setAttribute('height', H);
  let paths='';
  MATCHES.forEach(m=>{
    const flow=FLOWS_TO[m.id]; if(!flow) return;
    const fromEl=stageEl.querySelector(`.match[data-mid="${m.id}"]`);
    const toEl=stageEl.querySelector(`.match[data-mid="${flow.matchId}"]`);
    if(!fromEl||!toEl) return;
    const fr=localRect(fromEl), tr=localRect(toEl);
    const isRight = m.side==='R';
    let x1,x2;
    if(!isRight){ x1=fr.right; x2=tr.left; }   // 左半区从右出，进下场左
    else{ x1=fr.left; x2=tr.right; }           // 右半区从左出，进下场右
    const y1=fr.top+fr.h/2, y2=tr.top+tr.h/2;
    const midx=(x1+x2)/2;
    // 肘形：水平→竖直→水平
    paths += `<path d="M${x1},${y1} H${midx} V${y2} H${x2}" fill="none" stroke="rgba(255,210,74,.5)" stroke-width="1.6"/>`;
  });
  linesSvg.innerHTML = paths;
}

/* ---------- 6. 一屏自适应：scale=min(可用宽/树宽, 可用高/树高)，缩放后水平+垂直居中 ----------
   电脑和手机竖屏都把整张树放进顶部之外的剩余区域，无需滚动。
   transform-origin 用 top left，再用 translate 把缩放后的树平移到居中位置（不会缩成一条缝）。
*/
function fitStage(){
  const vp = document.getElementById('stageViewport');
  const availW = vp.clientWidth;
  const availH = vp.clientHeight;
  if(availW<=0 || availH<=0) return;
  const natW = stageEl.offsetWidth;            // 自然宽（1560 + padding）
  const natH = stageEl.offsetHeight;           // 自然高（含列头 padding），不受 transform 影响
  // 取宽高两个比例的较小者，保证整张树都进得去；留一点安全边距
  let scale = Math.min(availW/natW, availH/natH) * 0.985;
  if(scale>1) scale=1;                          // 桌面不放大超过 1:1
  // 居中偏移：剩余空白的一半
  const offX = Math.max(0, (availW - natW*scale)/2);
  const offY = Math.max(0, (availH - natH*scale)/2);
  stageEl.style.transform = `translate(${offX}px, ${offY}px) scale(${scale})`;
  // 缩放后重画连接线（drawLines 用未缩放本地坐标，随 stage 一起被 scale，无需改）
  drawLines();
}

/* ---------- 10. 导出整张完整对阵图 PNG（纯 canvas 逐元素重绘，无外部库） ----------
   按 MATCHES 数据与 picks 状态，把屏幕上那棵镜像对阵树等比重绘到高分辨率 canvas：
   每张比赛卡(国旗 emoji + 队名) + 选中金色高亮 + 淘汰置灰删除线 + 轮次连接线
   + 中央冠军格(trophyImg 奖杯 + 冠军国旗 + 队名) + 三四名决赛。
   奖杯用 trophyImg(trophy.png 的 base64 dataURI)画入：dataURI 不读本地文件、file:// 下也不污染画布，能成功 toDataURL 导出。
*/
function exportPNG(){
  try{
    const champ=picks['FINAL'];

    // ---- 布局参数（导出图坐标系，单位 px）----
    const SC=2.0;                 // 缩放系数，最终宽 ~2160，清晰
    const cardW=120, slotH=34, cardH=slotH*2, vGap=14; // 卡片尺寸与同列卡间距(基准)
    const colGapBase=70;          // 列间水平间距
    const padX=70, padTop=210, padBottom=70;

    // 9 列的 x 起点：左半区 0..3、中央 4、右半区 5..8
    const colX=[];
    for(let g=0; g<9; g++){ colX[g]=padX + g*(cardW+colGapBase); }
    const treeW = colX[8]+cardW + padX;

    // 每列卡片数量：R32=8、R16=4、QF=2、SF=1（中央列单独处理）
    const perCol=[8,4,2,1, 1, 1,2,4,8];
    // R32 列总高决定整树高度
    const r32H = 8*cardH + 7*vGap;
    const treeH = padTop + r32H + padBottom;

    // 计算每场比赛卡的 (x,y)。用与页面相同的 gridColIndex 思路：
    // side L: g=col(0..3) -> 列1..4 即数组索引0..3；side R: 列9..6 即索引8..5；FINAL 在中央索引4
    function colIndexOf(m){
      if(m.side==='C') return 4;
      if(m.side==='L') return m.col;        // 0..3
      return 8-m.col;                       // R: col0->8 ... col3->5
    }
    // 同列内第 i 张卡（从上到下）的 y 中心：均匀分布在 r32 高度内
    // 用"按该列卡数均分"得到每张卡中心 y，保证父卡居于两子卡中点
    function cardCenterY(gIndex, i, count){
      const top=padTop, total=r32H;
      const band=total/count;
      return top + band*i + band/2;
    }
    // 收集每场卡的几何
    const geo={}; // id -> {x, cy, side}
    // 先按列归类并排序（R32 用 MATCHES 自然顺序；其余按 from 的顺序自然对应）
    const colMatches={}; for(let k=0;k<9;k++) colMatches[k]=[];
    MATCHES.forEach(m=>{ if(m.id==='FINAL') return; colMatches[colIndexOf(m)].push(m); });
    // 左半区索引 0..3、右半区 5..8
    Object.keys(colMatches).forEach(k=>{
      const list=colMatches[k]; const count=list.length;
      list.forEach((m,i)=>{
        geo[m.id]={ x:colX[k], cy:cardCenterY(k,i,count), side:m.side };
      });
    });
    // 决赛卡放中央列(4)，与左右 SF 同一垂直中线
    geo['FINAL']={ x:colX[4], cy:cardCenterY(4,0,1), side:'C' };

    // ---- 建 canvas ----
    const W=Math.round(treeW*SC), H=Math.round(treeH*SC);
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const ctx=cv.getContext('2d');
    ctx.scale(SC,SC);

    // 背景：球场照片(cover) + 深色遮罩(对齐主页) + 金色顶光 + 设计感金框
    ctx.fillStyle='#05101a'; ctx.fillRect(0,0,treeW,treeH);
    if(stadiumImg.complete && stadiumImg.naturalWidth){
      const iw=stadiumImg.naturalWidth, ih=stadiumImg.naturalHeight;
      const s=Math.max(treeW/iw, treeH/ih), dw=iw*s, dh=ih*s;   // cover 铺满
      ctx.drawImage(stadiumImg,(treeW-dw)/2,(treeH-dh)/2,dw,dh);
    }
    // 深色遮罩（与主页 body::before 同款：中心略亮、四周更暗）
    const rk=ctx.createRadialGradient(treeW/2,treeH*0.42,treeH*0.2,treeW/2,treeH*0.42,treeW*0.62);
    rk.addColorStop(0,'rgba(4,10,22,.42)'); rk.addColorStop(1,'rgba(4,10,22,.82)');
    ctx.fillStyle=rk; ctx.fillRect(0,0,treeW,treeH);
    const lk=ctx.createLinearGradient(0,0,0,treeH);
    lk.addColorStop(0,'rgba(4,10,22,.72)'); lk.addColorStop(.4,'rgba(4,10,22,.5)'); lk.addColorStop(1,'rgba(4,10,22,.78)');
    ctx.fillStyle=lk; ctx.fillRect(0,0,treeW,treeH);
    // 金色顶光
    const tg=ctx.createRadialGradient(treeW/2,120,40,treeW/2,120,treeW*0.45);
    tg.addColorStop(0,'rgba(255,210,74,.18)'); tg.addColorStop(1,'rgba(255,210,74,0)');
    ctx.fillStyle=tg; ctx.fillRect(0,0,treeW,420);
    // 设计感：金色外框 + 内描边 + 四角金线
    ctx.strokeStyle='rgba(255,210,74,.55)'; ctx.lineWidth=3;
    roundRect(ctx,18,18,treeW-36,treeH-36,18); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1;
    roundRect(ctx,30,30,treeW-60,treeH-60,14); ctx.stroke();
    (function(){const L=46,off=34;ctx.strokeStyle=TROPHY_GOLD;ctx.lineWidth=3;
      [[off,off,1,1],[treeW-off,off,-1,1],[off,treeH-off,1,-1],[treeW-off,treeH-off,-1,-1]]
      .forEach(([cx,cy,sx,sy])=>{ctx.beginPath();ctx.moveTo(cx,cy+sy*L);ctx.lineTo(cx,cy);ctx.lineTo(cx+sx*L,cy);ctx.stroke();});
    })();

    // ---- 标题 + 完成度 ----
    ctx.textAlign='center';
    ctx.fillStyle='#FFD24A'; ctx.font='600 22px system-ui,"PingFang SC"';
    ctx.fillText('FIFA WORLD CUP 2026', treeW/2, 56);
    ctx.fillStyle='#fff'; ctx.font='800 40px system-ui,"PingFang SC"';
    ctx.fillText('2026 美加墨世界杯 · 我的夺冠之路', treeW/2, 104);
    if(champ){
      ctx.fillStyle=TROPHY_GOLD; ctx.font='600 24px system-ui,"PingFang SC"';
      ctx.fillText(`👑 我的冠军 · ${T[champ].name}`, treeW/2, 146);
    }

    // ---- 连接线（先画，垫在卡片下）----
    ctx.strokeStyle='rgba(255,210,74,.5)'; ctx.lineWidth=1.6;
    MATCHES.forEach(m=>{
      const flow=FLOWS_TO[m.id]; if(!flow) return;
      const from=geo[m.id], to=geo[flow.matchId]; if(!from||!to) return;
      const isRight = m.side==='R';
      let x1,x2;
      if(!isRight){ x1=from.x+cardW; x2=to.x; }     // 左半区从右出
      else{ x1=from.x; x2=to.x+cardW; }             // 右半区从左出
      const y1=from.cy, y2=to.cy, midx=(x1+x2)/2;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(midx,y1); ctx.lineTo(midx,y2); ctx.lineTo(x2,y2); ctx.stroke();
    });

    // ---- 画一张比赛卡 ----
    function drawCard(m){
      const g=geo[m.id]; if(!g) return;
      const x=g.x, y=g.cy-cardH/2;
      const winner=picks[m.id];
      const ta=resolveSlotTeam(m.a), tb=resolveSlotTeam(m.b);
      // 卡底 + 白色半透明边框
      roundRect(ctx,x,y,cardW,cardH,9);
      ctx.fillStyle='rgba(7,18,28,.78)'; ctx.fill();
      ctx.lineWidth=1.4; ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.stroke();
      // 中间分隔线
      ctx.beginPath(); ctx.moveTo(x,y+slotH); ctx.lineTo(x+cardW,y+slotH);
      ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=1; ctx.stroke();
      // 两个槽
      [['a',ta,y],['b',tb,y+slotH]].forEach(([slot,tc,sy])=>{
        const picked = tc && winner===tc;
        const loser  = tc && winner && winner!==tc;
        const isRight = m.side==='R';
        if(picked){ // 金色高亮底 + 左/右金条
          const gr=ctx.createLinearGradient(x,0,x+cardW,0);
          gr.addColorStop(0,'rgba(255,210,74,.26)'); gr.addColorStop(1,'rgba(255,210,74,.05)');
          ctx.fillStyle=gr; ctx.fillRect(x+1,sy+1,cardW-2,slotH-2);
          ctx.fillStyle=TROPHY_GOLD; ctx.fillRect(isRight?x+cardW-3:x+1, sy+1, 3, slotH-2);
        }
        // 文本：国旗 emoji + 队名（右半区右对齐镜像）
        ctx.textBaseline='middle';
        const ty=sy+slotH/2;
        if(!tc){
          ctx.fillStyle='#7f97a0'; ctx.font='italic 14px system-ui,"PingFang SC"';
          ctx.textAlign= isRight?'right':'left';
          ctx.fillText('待定', isRight?x+cardW-12:x+12, ty);
        }else{
          ctx.globalAlpha = loser?0.4:1;
          const flag=T[tc].flag, name=T[tc].name;
          ctx.font='17px "Apple Color Emoji","Segoe UI Emoji",system-ui';
          ctx.fillStyle='#fff';
          if(!isRight){
            ctx.textAlign='left';
            ctx.fillText(flag, x+10, ty);
            ctx.font='700 15px system-ui,"PingFang SC"';
            ctx.fillStyle = picked?TROPHY_GOLD:'#eef4f1';
            ctx.fillText(name, x+34, ty);
            if(loser) strikeText(name, x+34, ty, 'left');
          }else{
            ctx.textAlign='right';
            ctx.fillText(flag, x+cardW-10, ty);
            ctx.font='700 15px system-ui,"PingFang SC"';
            ctx.fillStyle = picked?TROPHY_GOLD:'#eef4f1';
            ctx.fillText(name, x+cardW-34, ty);
            if(loser) strikeText(name, x+cardW-34, ty, 'right');
          }
          ctx.globalAlpha=1;
        }
      });
      ctx.textBaseline='alphabetic';
    }
    // 删除线
    function strikeText(text,x,y,align){
      ctx.font='700 15px system-ui,"PingFang SC"';
      const w=ctx.measureText(text).width;
      const x1 = align==='left'? x : x-w;
      ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x1+w,y); ctx.stroke();
    }

    // 画全部比赛卡（含决赛）
    MATCHES.forEach(drawCard);

    // ---- 中央冠军格（trophyImg 奖杯 + 冠军国旗 + 队名），放在决赛卡上方 ----
    const fg=geo['FINAL'];
    const champCx=fg.x+cardW/2, champBottom=fg.cy-cardH/2-52;  // 抬高整组冠军信息，与决赛方框拉开距离
    // 奖杯：drawImage trophyImg(base64 dataURI)，未决出降亮
    const thH=120, thW=thH*(trophyImg.naturalWidth/trophyImg.naturalHeight || 1);
    const trophyTop=champBottom-thH-(champ?64:8);
    if(trophyImg.complete && trophyImg.naturalWidth){
      ctx.save();
      if(!champ) ctx.globalAlpha=0.45;
      else { ctx.shadowColor='rgba(255,210,74,.6)'; ctx.shadowBlur=24; }
      ctx.drawImage(trophyImg, champCx-thW/2, trophyTop, thW, thH);
      ctx.restore();
    }
    if(champ){
      ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.font='40px "Apple Color Emoji","Segoe UI Emoji",system-ui';
      ctx.fillStyle='#fff'; ctx.fillText(T[champ].flag, champCx, champBottom-16);
      ctx.font='800 30px system-ui,"PingFang SC"'; ctx.fillStyle=TROPHY_GOLD;
      ctx.fillText(T[champ].name, champCx, champBottom+12);
    }

    // ---- 三四名决赛（决赛卡下方）----
    const lLose=loserOf('LSF'), rLose=loserOf('RSF');
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    const ty3=fg.cy+cardH/2+30;
    ctx.fillStyle='#9fb6ad'; ctx.font='600 14px system-ui,"PingFang SC"';
    ctx.fillText('🥉 三四名决赛', champCx, ty3);
    ctx.font='15px system-ui,"PingFang SC"'; ctx.fillStyle='#eef4f1';
    ctx.fillText((lLose&&rLose)?`${T[lLose].flag} ${T[lLose].name}  vs  ${T[rLose].flag} ${T[rLose].name}`:'— 待半决赛分出胜负 —', champCx, ty3+24);

    // 落款
    ctx.fillStyle='rgba(255,210,74,.65)'; ctx.font='400 18px system-ui,"PingFang SC"';
    ctx.fillText('在「2026 美加墨世界杯 · 我的夺冠之路」生成', treeW/2, treeH-26);

    // ---- 导出 ----
    let url;
    try{ url=cv.toDataURL('image/png'); }
    catch(e){ toast('导出失败，请稍后重试'); return; }
    const a=document.createElement('a');
    a.download=`我的夺冠之路_${champ?T[champ].name:'未完成'}.png`;
    a.href=url; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('完整对阵图已导出 🖼️');
  }catch(err){
    toast('导出失败：'+(err&&err.message||err));
  }
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

const confettiCv=document.getElementById('confetti'),cctx=confettiCv.getContext('2d');
let parts=[],ctimer=null;
function rc(){confettiCv.width=innerWidth;confettiCv.height=innerHeight;}rc();
function fireConfetti(){
  const cs=['#FFD24A','#fff','#69d39a','#f6c64b','#ff8a5c','#6cc7ff'];parts=[];
  for(let i=0;i<160;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*200,y:innerHeight*.3,vx:(Math.random()-.5)*9,vy:Math.random()*-9-3,g:.18+Math.random()*.12,size:5+Math.random()*7,color:cs[i%cs.length],rot:Math.random()*Math.PI,vr:(Math.random()-.5)*.3,life:0});
  if(ctimer)cancelAnimationFrame(ctimer);anim();
}
function anim(){cctx.clearRect(0,0,confettiCv.width,confettiCv.height);let alive=false;
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
    if(p.y<confettiCv.height+40&&p.life<220){alive=true;cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.rot);cctx.fillStyle=p.color;cctx.globalAlpha=Math.max(0,1-p.life/220);cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);cctx.restore();}});
  if(alive)ctimer=requestAnimationFrame(anim);else cctx.clearRect(0,0,confettiCv.width,confettiCv.height);}

/* ---------- 13. 初始化 ---------- */
document.getElementById('btnRandom').addEventListener('click',randomFill);
document.getElementById('btnReset').addEventListener('click',resetAll);
document.getElementById('btnSave').addEventListener('click',()=>save(false));
document.getElementById('btnExport').addEventListener('click',exportPNG);
document.getElementById('btnCopyLink').addEventListener('click',copyLink);
// 视口/横竖屏变化重算一屏自适应
addEventListener('resize',()=>{rc();fitStage();});
addEventListener('orientationchange',()=>setTimeout(()=>{rc();fitStage();},200));

load();
render();
// 顶部高度/字体加载后布局会变化，多次重算 fit，保证首屏就一屏放下、不溢出
requestAnimationFrame(fitStage);
setTimeout(fitStage,150);
setTimeout(fitStage,500);
addEventListener('load',fitStage);
</script>
</body>
</html>
